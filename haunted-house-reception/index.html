<!DOCTYPE html>
<html>
<head>
    <title>お化け屋敷受付</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div><h1>お化け屋敷受付</h1></div>


    <div id="main">
        <div id="waitcount" class="card">
            <p id="count"></p>
            <div id="buttons">
                <button id="minus">-</button>
                <button id="plus">+</button>
            </div>
        </div>

        <div id="timers" class="card">
            <p id="bt">前回の入場から</p>
            <p id="timer">00:00</p>
            <button id="start">入場した！</button>
            <button id="stop">ストップ</button>
        </div>
        
        <script src="script.js"></script>
        </div>

</body>
</html>
